<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Smooby Tech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .box { background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 500px; width: 100%; text-align: center; border-bottom: 5px solid #ffcc00; }
        h1 { color: #ffcc00; font-size: 1.4rem; }
        .progress { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; }
        p { font-size: 1.1rem; min-height: 60px; }
        button { background: #ffcc00; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        textarea { width: 100%; padding: 10px; border-radius: 8px; border: none; margin-top: 10px; display: none; }
        .whatsapp-btn { background: #25D366; color: white; display: none; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h1>⚡ Diagnostic Smooby</h1>
    <div class="progress" id="compteur">Question 1 / 11</div>
    <p id="question">Est-ce que vos voisins ont du courant ?</p>
    
    <div id="actions">
        <button onclick="choisir('Voisins ont du courant')">OUI</button>
        <button onclick="choisir('Quartier dans le noir')">NON</button>
    </div>

    <textarea id="description" rows="4" placeholder="Décrivez le problème ici (bruit, étincelles, fumée...)"></textarea>
    <a href="#" id="whatsappLink" class="whatsapp-btn">🚀 Envoyer le rapport à Smooby Tech</a>
</div>

<script>
    let etape = 1;
    let rapport = [];
    let numeroWhatsApp = "243999704541"; // REMPLACE PAR TON NUMÉRO ICI

    function choisir(reponse) {
        rapport.push("Q" + etape + ": " + reponse);
        etape++;

        let texte = document.getElementById('question');
        let boutons = document.getElementById('actions');
        let compteur = document.getElementById('compteur');

        compteur.innerText = "Question " + etape + " / 11";

        if (etape == 2) {
            texte.innerHTML = "Un disjoncteur est-il tombé vers le bas ?";
            boutons.innerHTML = `<button onclick="choisir('Disjoncteur BAS')">OUI</button><button onclick="choisir('Tout est HAUT')">NON</button>`;
        }
        else if (etape == 3) {
            texte.innerHTML = "Y a-t-il une odeur de brûlé près du tableau ou d'une prise ?";
            boutons.innerHTML = `<button onclick="choisir('Odeur de brûlé')">OUI</button><button onclick="choisir('Pas d\'odeur')">NON</button>`;
        }
        else if (etape == 4) {
            texte.innerHTML = "Est-ce arrivé après avoir branché un appareil (fer, réchaud...) ?";
            boutons.innerHTML = `<button onclick="choisir('Après branchement')">OUI</button><button onclick="choisir('Soudainement')">NON</button>`;
        }
        else if (etape == 5) {
            texte.innerHTML = "Vos ampoules clignotent-elles ou brillent-elles trop fort ?";
            boutons.innerHTML = `<button onclick="choisir('Instabilité tension')">OUI</button><button onclick="choisir('Tension stable')">NON</button>`;
        }
        // ... Tu peux ajouter d'autres étapes ici sur le même modèle jusqu'à 10 ...
        else {
            // Étape 6 : Description libre
            compteur.innerText = "Question 6 / 6";
            texte.innerHTML = "<b>Dernière étape :</b> Décrivez avec vos mots ce que vous voyez ou ressentez (bruits, localisation...)";
            boutons.style.display = "none";
            document.getElementById('description').style.display = "block";
            
            let link = document.getElementById('whatsappLink');
            link.style.display = "inline-block";
            link.onclick = envoyerRapport;
        }
    }

    function envoyerRapport() {
        let desc = document.getElementById('description').value;
        let message = "Bonjour Smooby Tech, voici mon diagnostic :\n\n" + rapport.join("\n") + "\n\nDescription client : " + desc;
        let url = "https://wa.me/" + numeroWhatsApp + "?text=" + encodeURIComponent(message);
        window.open(url, '_blank');
    }
</script>

</body>
</html>
