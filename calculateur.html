<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calculateur de Puissance - Smooby Tech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #1c1e21; }
        .calc-container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { color: #004aad; text-align: center; font-size: 1.5rem; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .resultat-box { background: #e7f3ff; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }
        #totalWatts { font-size: 24px; color: #004aad; font-weight: bold; }
        .conseil { font-size: 0.9rem; color: #555; margin-top: 10px; font-style: italic; }
        .btn-home { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #666; }
    </style>
</head>
<body>

<div class="calc-container">
    <h1>Calculateur KVA/Watts</h1>
    <p style="text-align: center;">Estimez la puissance totale de votre maison.</p>

    <div class="input-group">
        <label>Nombre de Lampes (LED ≈ 10W)</label>
        <input type="number" id="l" value="0" oninput="calculerPuissance()">
    </div>

    <div class="input-group">
        <label>Télévisions (≈ 150W)</label>
        <input type="number" id="tv" value="0" oninput="calculerPuissance()">
    </div>

    <div class="input-group">
        <label>Réfrigérateurs (≈ 300W)</label>
        <input type="number" id="frigo" value="0" oninput="calculerPuissance()">
    </div>

    <div class="input-group">
        <label>Climatiseurs / Fours (≈ 2000W)</label>
        <input type="number" id="clim" value="0" oninput="calculerPuissance()">
    </div>

    <div class="resultat-box">
        Total : <span id="totalWatts">0</span> Watts
        <div id="kva" style="font-weight: bold; margin-top: 5px;">≈ 0 KVA</div>
        <p class="conseil" id="conseil">Ajoutez des appareils pour voir le conseil.</p>
    </div>

    <a href="index.html" class="btn-home">← Retour à l'accueil</a>
</div>

<script>
    function calculerPuissance() {
        let wL = document.getElementById('l').value * 10;
        let wTv = document.getElementById('tv').value * 150;
        let wFrigo = document.getElementById('frigo').value * 300;
        let wClim = document.getElementById('clim').value * 2000;

        let total = wL + wTv + wFrigo + wClim;
        let kva = (total / 1000) * 1.2; // Approximation KVA simple

        document.getElementById('totalWatts').innerText = total;
        document.getElementById('kva').innerText = "≈ " + kva.toFixed(1) + " KVA";

        let c = document.getElementById('conseil');
        if (total === 0) c.innerText = "Ajoutez des appareils.";
        else if (total < 1000) c.innerText = "Un petit stabilisateur de 2KVA suffit.";
        else if (total < 3000) c.innerText = "Prévoyez un stabilisateur de 5KVA ou plus.";
        else c.innerText = "Installation importante. Contactez Smooby Tech pour un devis précis.";
    }
</script>

</body>
</html>
