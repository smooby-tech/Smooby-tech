<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturation - Smooby Tech</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eee; padding: 10px; }
        .invoice-box {
            max-width: 500px; margin: auto; padding: 20px;
            background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #004aad; padding-bottom: 10px; }
        .logo { color: #004aad; font-weight: bold; font-size: 1.5rem; }
        .form-section { margin-top: 20px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .total-box { background: #004aad; color: white; padding: 15px; text-align: center; font-size: 1.2rem; margin-top: 15px; border-radius: 5px; }
        .no-print { margin-top: 20px; text-align: center; }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        @media print { .no-print { display: none; } body { background: white; padding: 0; } }
    </style>
</head>
<body>

    <div class="invoice-box" id="facture">
        <div class="header">
            <div class="logo">SMOOBY TECH</div>
            <div style="text-align: right; font-size: 0.8rem;">Lubumbashi, RDC<br>Date: <span id="currentDate"></span></div>
        </div>

        <div class="form-section">
            <input type="text" id="clientNom" placeholder="Nom du Client" oninput="updateView()">
            <textarea id="details" placeholder="Description des travaux (ex: Installation 2 panneaux, 1 batterie...)" rows="4" oninput="updateView()"></textarea>
            <input type="number" id="montant" placeholder="Montant Total (FC ou $)" oninput="updateView()">
        </div>

        <div id="preview">
            <p><strong>Client :</strong> <span id="showNom">...</span></p>
            <p><strong>Travaux :</strong><br><span id="showDetails" style="white-space: pre-line;">...</span></p>
            <div class="total-box">
                TOTAL À PAYER : <span id="showTotal">0</span>
            </div>
        </div>
    </div>

    <div class="no-print">
        <p><i>Astuce : Remplis les champs et fais une capture d'écran ou clique sur "Imprimer" pour sauvegarder en PDF.</i></p>
        <button onclick="window.print()">Imprimer la Facture</button>
    </div>

    <script>
        // Met à jour la date automatiquement
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString();

        function updateView() {
            document.getElementById('showNom').innerText = document.getElementById('clientNom').value || "...";
            document.getElementById('showDetails').innerText = document.getElementById('details').value || "...";
            document.getElementById('showTotal').innerText = document.getElementById('montant').value || "0";
        }
    </script>
</body>
</html>
